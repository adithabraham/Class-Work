<!DOCTYPE html>
<html>
<head>
    <title>4 Sections Layout</title>
    <style>
        div {
            width: 50%;
            height: 200px;
            float: left;
            text-align: center;
            color: white;
        }

        .one { background-color: red; }
        .two { background-color: green; }
        .three { background-color: blue; }
        .four { background-color: orange; }
    </style>
</head>

<body>

    <div class="one"><h2>Section 1</h2></div>
    <div class="two"><h2>Section 2</h2></div>
    <div class="three"><h2>Section 3</h2></div>
    <div class="four"><h2>Section 4</h2></div>

</body>
</html>
